# This project uses S3 storage
# Configure in Railway dashboard with:
# STORAGE_BUCKET_NAME, STORAGE_BUCKET_REGION, STORAGE_BUCKET_ACCESS_KEY_ID, etc.

test:
  service: Disk
  root: <%= Rails.root.join("tmp/storage") %>

local:
  service: Disk
  root: <%= Rails.root.join("storage") %>

# S3 storage for production videos/images
amazon:
  service: S3
  access_key_id: <%= ENV.fetch("STORAGE_BUCKET_ACCESS_KEY_ID", ENV.fetch("AWS_ACCESS_KEY_ID", "")) %>
  secret_access_key: <%= ENV.fetch("STORAGE_BUCKET_SECRET_ACCESS_KEY", ENV.fetch("AWS_SECRET_ACCESS_KEY", "")) %>
  region: <%= ENV.fetch("STORAGE_BUCKET_REGION", ENV.fetch("AWS_REGION", "us-east-1")) %>
  bucket: <%= ENV.fetch("STORAGE_BUCKET_NAME", "ultimate-social-media-production") %>
  public: true
  http_open_timeout: 5
  http_read_timeout: 5
  retry_limit: 3

# Legacy storage_bucket config (kept for backward compatibility)
storage_bucket:
  service: S3
  access_key_id: <%= ENV.fetch("ULTIMATE_STORAGE_BUCKET_ACCESS_KEY_ID", "") %>
  secret_access_key: <%= ENV.fetch("ULTIMATE_STORAGE_BUCKET_SECRET_ACCESS_KEY", "") %>
  region: <%= ENV.fetch("ULTIMATE_STORAGE_BUCKET_REGION", "us-east-1") %>
  bucket: <%= ENV.fetch("ULTIMATE_STORAGE_BUCKET_NAME", "") %>